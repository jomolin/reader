<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>Room 21 Library</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', 'D2Coding', monospace;
    background: #1a1a1a;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 2rem;
  }

  .container { max-width: 1200px; margin: 0 auto; }

  header {
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 1rem;
    flex-wrap: wrap;
  }

  header h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.25rem; }
  header p { color: #888; font-size: 0.9rem; }

  .header-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  #collection-select {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #e0e0e0;
    padding: 0.4rem 0.6rem;
    font-family: inherit;
    font-size: 0.85rem;
    border-radius: 2px;
    cursor: pointer;
  }
  #collection-select:focus { outline: none; border-color: #888; }

  .btn-secondary {
    background: none;
    border: 1px solid #333;
    color: #888;
    padding: 0.4rem 0.8rem;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    border-radius: 2px;
    text-decoration: none;
  }
  .btn-secondary:hover { color: #e0e0e0; border-color: #666; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1rem;
  }

  .book {
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 2px;
    padding: 1rem;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: background 0.15s, border-color 0.15s;
    aspect-ratio: 3 / 4;
    justify-content: space-between;
  }
  .book:hover { background: #333; border-color: #666; }

  .book-title { font-size: 0.95rem; font-weight: 500; line-height: 1.3; }
  .book-meta { font-size: 0.75rem; color: #888; margin-top: auto; }

  .empty {
    color: #666;
    font-size: 0.9rem;
    font-style: italic;
    grid-column: 1 / -1;
    text-align: center;
    padding: 2rem;
  }

  footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid #333;
    color: #555;
    font-size: 0.8rem;
  }

  #login-screen, #chooser-screen {
    min-height: 70vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 1rem;
  }
  #login-screen h1, #chooser-screen h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  #login-screen p, #chooser-screen p { color: #888; font-size: 0.9rem; margin-bottom: 1rem; }

  #login-form {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    width: 100%;
    max-width: 300px;
  }
  #login-form input {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #e0e0e0;
    padding: 0.75rem;
    font-family: inherit;
    font-size: 1rem;
    border-radius: 2px;
  }
  #login-form input:focus { outline: none; border-color: #888; }
  #login-form button {
    background: #333;
    border: 1px solid #555;
    color: #e0e0e0;
    padding: 0.75rem;
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    border-radius: 2px;
  }
  #login-form button:hover { background: #444; border-color: #777; }

  #login-error {
    color: #c88;
    font-size: 0.85rem;
    min-height: 1rem;
    text-align: center;
  }

  #chooser-buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
    width: 100%;
    max-width: 700px;
  }
  .collection-btn {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #e0e0e0;
    padding: 1.5rem 1rem;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 2px;
    text-align: left;
    transition: background 0.15s, border-color 0.15s;
  }
  .collection-btn:hover:not(:disabled) { background: #333; border-color: #777; }
  .collection-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .collection-btn .col-name { font-size: 1.05rem; font-weight: 500; }
  .collection-btn .col-meta { font-size: 0.8rem; color: #888; margin-top: 0.4rem; }

  #chooser-actions {
    margin-top: 1rem;
  }

  #library { display: none; }
  #chooser-screen { display: none; }
</style>
</head>
<body>

<div class="container">

<div id="login-screen">
  <h1>BSLA Library</h1>
  <p>enter class password</p>
  <form id="login-form" autocomplete="off">
    <input type="password" id="password" placeholder="password" autofocus>
    <button type="submit">enter</button>
    <div id="login-error"></div>
  </form>
</div>

<div id="chooser-screen">
  <h1>BSLA Library</h1>
  <p>choose a collection</p>
  <div id="chooser-buttons"></div>
  <div id="chooser-actions">
    <button id="chooser-logout" class="btn-secondary">lock</button>
  </div>
</div>

<div id="library">
  <header>
    <div>
      <h1 id="library-title">Library</h1>
      <p>click a book to start reading</p>
    </div>
    <div class="header-actions">
      <select id="collection-select"></select>
      <button id="back-to-chooser" class="btn-secondary">collections</button>
      <button id="logout" class="btn-secondary">lock</button>
    </div>
  </header>

  <div class="grid" id="book-grid"></div>

  <footer>
    <p>all texts used under NZ Ministry of Education educational licensing</p>
  </footer>
</div>

</div>

<script>

// =====================================================================
// Web Crypto helpers (AES-GCM + PBKDF2)
// =====================================================================
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 250000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function decryptCollections(password) {
  const payload = b64ToBytes(ENCRYPTED_BOOKS);
  const salt = payload.slice(0, 16);
  const iv = payload.slice(16, 28);
  const ciphertext = payload.slice(28);
  const key = await deriveKey(password, salt);
  const plainBuf = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv }, key, ciphertext
  );
  return JSON.parse(new TextDecoder().decode(plainBuf));
}

// =====================================================================
// Views
// =====================================================================
let COLLECTIONS = null;

function showOnly(id) {
  for (const v of ['login-screen', 'chooser-screen', 'library']) {
    document.getElementById(v).style.display = (v === id) ? (v === 'library' ? 'block' : 'flex') : 'none';
  }
}

function renderChooser() {
  const wrap = document.getElementById('chooser-buttons');
  wrap.innerHTML = '';
  for (const [id, col] of Object.entries(COLLECTIONS)) {
    const count = (col.items || []).length;
    const btn = document.createElement('button');
    btn.className = 'collection-btn';
    btn.disabled = count === 0;
    btn.innerHTML = `
      <div class="col-name">${col.name}</div>
      <div class="col-meta">${count} ${col.type}${count === 1 ? '' : 's'}${count === 0 ? ' — coming soon' : ''}</div>
    `;
    btn.addEventListener('click', () => openLibrary(id));
    wrap.appendChild(btn);
  }
  showOnly('chooser-screen');
}

function renderCollectionGrid(id) {
  const col = COLLECTIONS[id];
  const grid = document.getElementById('book-grid');
  grid.innerHTML = '';
  document.getElementById('library-title').textContent = col.name;

  const items = col.items || [];
  if (!items.length) {
    grid.innerHTML = `<p class="empty">no ${col.type}s yet</p>`;
    return;
  }
  items.forEach(b => {
    const a = document.createElement('a');
    a.className = 'book';
    const path = `${col.folder}/${b.file}`;
    const qs = new URLSearchParams({
      path,
      type: col.type,
      title: b.title,
      collection: id,
    });
    a.href = `reader.html?${qs.toString()}`;
    a.innerHTML = `
      <div class="book-title">${b.title}</div>
      <div class="book-meta">${b.meta || ''}</div>
    `;
    grid.appendChild(a);
  });
}

function openLibrary(id) {
  if (!COLLECTIONS[id]) return;
  sessionStorage.setItem('room21_collection', id);

  const select = document.getElementById('collection-select');
  select.innerHTML = '';
  for (const [cid, col] of Object.entries(COLLECTIONS)) {
    const opt = document.createElement('option');
    opt.value = cid;
    opt.textContent = col.name;
    if (cid === id) opt.selected = true;
    select.appendChild(opt);
  }

  renderCollectionGrid(id);
  showOnly('library');
}

// =====================================================================
// Login flow
// =====================================================================
async function tryUnlock(password) {
  try {
    const cols = await decryptCollections(password);
    sessionStorage.setItem('room21_pw', password);
    sessionStorage.setItem('room21_collections', JSON.stringify(cols));
    COLLECTIONS = cols;
    renderChooser();
    return true;
  } catch (e) {
    return false;
  }
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  const ok = await tryUnlock(pw);
  if (!ok) {
    errEl.textContent = 'wrong password';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
});

function logout() {
  sessionStorage.removeItem('room21_pw');
  sessionStorage.removeItem('room21_collections');
  sessionStorage.removeItem('room21_collection');
  location.reload();
}

document.getElementById('logout').addEventListener('click', logout);
document.getElementById('chooser-logout').addEventListener('click', logout);

document.getElementById('back-to-chooser').addEventListener('click', () => {
  sessionStorage.removeItem('room21_collection');
  renderChooser();
});

document.getElementById('collection-select').addEventListener('change', (e) => {
  openLibrary(e.target.value);
});

// Auto-unlock from session
(async () => {
  const stored = sessionStorage.getItem('room21_pw');
  const cached = sessionStorage.getItem('room21_collections');
  if (stored && cached) {
    try {
      COLLECTIONS = JSON.parse(cached);
      const lastCol = sessionStorage.getItem('room21_collection');
      if (lastCol && COLLECTIONS[lastCol]) {
        openLibrary(lastCol);
      } else {
        renderChooser();
      }
    } catch {
      sessionStorage.clear();
    }
  }
})();
</script>

</body>
</html>
