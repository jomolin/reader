<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>Room 21 Library</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', 'D2Coding', monospace;
    background: #1a1a1a;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 2rem;
  }

  .container { max-width: 1200px; margin: 0 auto; }

  header {
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  header h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.25rem; }
  header p { color: #888; font-size: 0.9rem; }

  #logout {
    background: none;
    border: 1px solid #333;
    color: #888;
    padding: 0.4rem 0.8rem;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    border-radius: 2px;
  }
  #logout:hover { color: #e0e0e0; border-color: #666; }

  .section-title {
    font-size: 1rem;
    color: #888;
    margin: 2rem 0 1rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .section-title:first-of-type { margin-top: 0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1rem;
  }

  .book {
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 2px;
    padding: 1rem;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: background 0.15s, border-color 0.15s;
    aspect-ratio: 3 / 4;
    justify-content: space-between;
  }
  .book:hover { background: #333; border-color: #666; }

  .book-title { font-size: 0.95rem; font-weight: 500; line-height: 1.3; }
  .book-meta { font-size: 0.75rem; color: #888; margin-top: auto; }

  .empty {
    color: #666;
    font-size: 0.9rem;
    font-style: italic;
    grid-column: 1 / -1;
    text-align: center;
    padding: 2rem;
  }

  footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid #333;
    color: #555;
    font-size: 0.8rem;
  }

  #login-screen {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 1rem;
  }
  #login-screen h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  #login-screen p { color: #888; font-size: 0.9rem; margin-bottom: 1rem; }

  #login-form {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    width: 100%;
    max-width: 300px;
  }
  #login-form input {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #e0e0e0;
    padding: 0.75rem;
    font-family: inherit;
    font-size: 1rem;
    border-radius: 2px;
  }
  #login-form input:focus { outline: none; border-color: #888; }
  #login-form button {
    background: #333;
    border: 1px solid #555;
    color: #e0e0e0;
    padding: 0.75rem;
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    border-radius: 2px;
  }
  #login-form button:hover { background: #444; border-color: #777; }

  #login-error {
    color: #c88;
    font-size: 0.85rem;
    min-height: 1rem;
    text-align: center;
  }

  #library { display: none; }
</style>
</head>
<body>

<div class="container">

<div id="login-screen">
  <h1>Room 21 Library</h1>
  <p>enter class password</p>
  <form id="login-form" autocomplete="off">
    <input type="password" id="password" placeholder="password" autofocus>
    <button type="submit">enter</button>
    <div id="login-error"></div>
  </form>
</div>

<div id="library">
  <header>
    <div>
      <h1>Room 21 Library</h1>
      <p>click a book to start reading</p>
    </div>
    <button id="logout">lock</button>
  </header>

  <h2 class="section-title">PDFs</h2>
  <div class="grid" id="pdf-grid"></div>

  <h2 class="section-title">EPUBs</h2>
  <div class="grid" id="epub-grid">
    <p class="empty">no epubs yet</p>
  </div>

  <footer>
    <p>all texts used under NZ Ministry of Education educational licensing</p>
  </footer>
</div>

</div>

// =====================================================================
// Web Crypto helpers (AES-GCM + PBKDF2)
// =====================================================================
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 250000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function decryptBooks(password) {
  const payload = b64ToBytes(ENCRYPTED_BOOKS);
  const salt = payload.slice(0, 16);
  const iv = payload.slice(16, 28);
  const ciphertext = payload.slice(28);
  const key = await deriveKey(password, salt);
  const plainBuf = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv }, key, ciphertext
  );
  return JSON.parse(new TextDecoder().decode(plainBuf));
}

// =====================================================================
// Library rendering
// =====================================================================
function renderGrid(gridId, items, type) {
  const grid = document.getElementById(gridId);
  if (!items || !items.length) return;
  grid.innerHTML = '';
  items.forEach(b => {
    const a = document.createElement('a');
    a.className = 'book';
    const param = type === 'epub' ? 'epub' : 'book';
    a.href = `reader.html?${param}=${encodeURIComponent(b.file)}&title=${encodeURIComponent(b.title)}`;
    a.innerHTML = `
      <div class="book-title">${b.title}</div>
      <div class="book-meta">${b.meta || ''}</div>
    `;
    grid.appendChild(a);
  });
}

function showLibrary(books) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('library').style.display = 'block';
  renderGrid('pdf-grid', books.pdf || [], 'pdf');
  renderGrid('epub-grid', books.epub || [], 'epub');
  if (!books.pdf || !books.pdf.length) {
    document.getElementById('pdf-grid').innerHTML = '<p class="empty">no books yet</p>';
  }
  if (!books.epub || !books.epub.length) {
    document.getElementById('epub-grid').innerHTML = '<p class="empty">no epubs yet</p>';
  }
}

// =====================================================================
// Login flow
// =====================================================================
async function tryUnlock(password) {
  try {
    const books = await decryptBooks(password);
    sessionStorage.setItem('room21_pw', password);
    sessionStorage.setItem('room21_books', JSON.stringify(books));
    showLibrary(books);
    return true;
  } catch (e) {
    return false;
  }
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  const ok = await tryUnlock(pw);
  if (!ok) {
    errEl.textContent = 'wrong password';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
});

document.getElementById('logout').addEventListener('click', () => {
  sessionStorage.removeItem('room21_pw');
  sessionStorage.removeItem('room21_books');
  location.reload();
});

// Auto-unlock from session
(async () => {
  const stored = sessionStorage.getItem('room21_pw');
  const cachedBooks = sessionStorage.getItem('room21_books');
  if (stored && cachedBooks) {
    try {
      showLibrary(JSON.parse(cachedBooks));
    } catch {
      sessionStorage.clear();
    }
  }
})();
